<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nosy</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="screen">
    <div class="card center">
      <h1>Nosy</h1>
      <p class="subtitle">Your morning, summarized.</p>

      <div id="login-error" class="error-banner hidden"></div>

      <form id="login-form" novalidate>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="alex@demo.test" autocomplete="username" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="demo1234" autocomplete="current-password" required />

        <button type="submit">Log in</button>
      </form>

      <p class="divider">or try a demo account</p>

      <div class="demo-buttons">
        <button type="button" class="secondary" id="demo-alex">Log in as Alex</button>
        <button type="button" class="secondary" id="demo-sam">Log in as Sam</button>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
